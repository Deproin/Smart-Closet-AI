services:
  - type: web
    name: smart-closet-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-closet-db
          property: connectionString
      - key: WEATHER_API_KEY
        sync: false # You will need to add this manually in the Render dashboard

databases:
  - name: smart-closet-db
    databaseName: smart_closet
    user: admin
